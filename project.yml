name: TouchGrass
options:
  bundleIdPrefix: app
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: app.touchgrass
    MARKETING_VERSION: "0.1.2"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_HARDENED_RUNTIME: YES
    # Sign with a real Apple Development identity (Pratyush Singh, team 728M4WMSGG)
    # so macOS will show the notification permission dialog — ad-hoc/unsigned builds
    # are refused ("Notifications are not allowed for this application").
    # (scripts/release.sh re-signs with the Developer ID identity for distribution.)
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: 728M4WMSGG
    CODE_SIGN_IDENTITY: "Apple Development: Pratyush Singh (QNV64HT6QS)"
    GENERATE_INFOPLIST_FILE: NO
    DEAD_CODE_STRIPPING: YES
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.0"
targets:
  TouchGrass:
    type: application
    platform: macOS
    sources:
      - path: TouchGrass
    settings:
      base:
        INFOPLIST_FILE: TouchGrass/Info.plist
        CODE_SIGN_ENTITLEMENTS: TouchGrass/TouchGrass.entitlements
        PRODUCT_NAME: TouchGrass
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Sparkle.framework is embedded under Contents/Frameworks.
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    dependencies:
      - package: Sparkle
        product: Sparkle
