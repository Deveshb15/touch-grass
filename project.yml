name: TouchGrass
options:
  bundleIdPrefix: so.lovegpt
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: so.lovegpt.touchgrass
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
    DEAD_CODE_STRIPPING: YES
targets:
  TouchGrass:
    type: application
    platform: macOS
    sources:
      - path: TouchGrass
    settings:
      base:
        INFOPLIST_FILE: TouchGrass/Info.plist
        CODE_SIGN_ENTITLEMENTS: TouchGrass/TouchGrass.entitlements
        PRODUCT_NAME: TouchGrass
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
